name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: apm
            archive: apm-aarch64-apple-darwin.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: apm
            archive: apm-x86_64-apple-darwin.tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: apm
            archive: apm-x86_64-unknown-linux-gnu.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: apm
            archive: apm-aarch64-unknown-linux-gnu.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: apm.exe
            archive: apm-x86_64-pc-windows-msvc.zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure cross-linker (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} .
          tar czf ${{ matrix.archive }} ${{ matrix.binary }}
          shasum -a 256 ${{ matrix.archive }} > ${{ matrix.archive }}.sha256

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" .
          Compress-Archive -Path ${{ matrix.binary }} -DestinationPath ${{ matrix.archive }}
          (Get-FileHash ${{ matrix.archive }} -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.archive }}" | Out-File -Encoding ascii ${{ matrix.archive }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ github.ref_name }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Merge checksums
        run: cat artifacts/*.sha256 > artifacts/checksums.sha256

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/checksums.sha256

  update-formula:
    name: Update Homebrew formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: zanets/homebrew-tap
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}

      - name: Download checksums
        run: gh release download ${{ github.ref_name }} --repo zanets/apm --pattern "checksums.sha256" --output checksums.sha256
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update Formula/apm.rb
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          get_sha() { grep "$1" checksums.sha256 | awk '{print $1}'; }
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/apm.rb
          sed -i "/aarch64-apple-darwin.tar.gz/{n;s/sha256 \".*\"/sha256 \"$(get_sha aarch64-apple-darwin.tar.gz)\"/}" Formula/apm.rb
          sed -i "/x86_64-apple-darwin.tar.gz/{n;s/sha256 \".*\"/sha256 \"$(get_sha x86_64-apple-darwin.tar.gz)\"/}" Formula/apm.rb
          sed -i "/aarch64-unknown-linux-gnu.tar.gz/{n;s/sha256 \".*\"/sha256 \"$(get_sha aarch64-unknown-linux-gnu.tar.gz)\"/}" Formula/apm.rb
          sed -i "/x86_64-unknown-linux-gnu.tar.gz/{n;s/sha256 \".*\"/sha256 \"$(get_sha x86_64-unknown-linux-gnu.tar.gz)\"/}" Formula/apm.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/apm.rb
          git diff --cached --quiet || git commit -m "chore(formula): update apm.rb for ${{ github.ref_name }}"
          git push
